<!DOCTYPE html>
<html>
<head>
<title>Student System</title>
<link rel="stylesheet"href="style.css">
</head>
<body>
<!-- ================= REGISTER ================= -->
<table border="5%"cellpadding="5%"width="100%"height="100%"cellspacing="0">
<tr>
<td>
<div id="register" class="page">
<header>
<h2>Registration Form</h2>
<h4>This is example of application Register system</h4>
<img src="logo1.jpg">
</header></br></br></br></br>
<form id="regForm">
<input type="text" id="fname" placeholder="First Name"required><br>
<input type="text" id="sname" placeholder="Second Name" required><br>
<input type="text" id="lname" placeholder="Last Name" required><br>
<input type="number" id="phone" placeholder="Phone Number" required><br>
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>
<br>
<input type="email" id="email" placeholder="Email" required><br>
<input type="text" id="nation" placeholder="Nationality" required><br>
<input type="password" id="password" placeholder="Enter your Password" required><br>
<button type="submit">Register</button>
</form>
<p>Already registered? <button onclick="show('login')">Login</button></p>
</div>
<!-- ================= LOGIN ================= -->
<div id="login" class="page">
<h2>Login</h2>
<form id="loginForm">
<input type="text" id="lphone" placeholder="Phone Number" required><br>
<input type="password" id="lpassword" placeholder="Password" required><br>
<button type="submit">Login</button>
</form>
<h3>Admin Only can Login here</h3>
<input type="password" id="adminPass" placeholder="Admin Password">
<button onclick="adminLogin()">Admin Login</button>
<p><button onclick="show('register')">Back</button></p>
</div>
<!-- ================= DASHBOARD ================= -->
<div id="dashboard" class="page">
    
<div id="output"></div>
<button onclick="logout()">Logout</button>
</div>
<script>
function loadDashboard(){
    let isAdmin = localStorage.getItem("admin");
    let content = document.getElementById("content");

    content.innerHTML = "";

    if(isAdmin === "true"){
        let students = JSON.parse(localStorage.getItem("students")) || [];

        let table = `
            <h3>All Registered Students</h3>
            <table border="1" cellpadding="10">
                <tr>
                    <th>#</th>
                    <th>First Name</th>
                    <th>Second Name</th>
                    <th>Last Name</th>
                    <th>Phone</th>
                    <th>Gender</th>
                    <th>Email</th>
                    <th>Nationality</th>
                </tr>
        `;

        students.forEach((s, index) => {
            table += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${s.fname}</td>
                    <td>${s.sname}</td>
                    <td>${s.lname}</td>
                    <td>${s.phone}</td>
                    <td>${s.gender}</td>
                    <td>${s.email}</td>
                    <td>${s.nation}</td>
                </tr>
            `;
        });

        table += `</table>`;

        content.innerHTML = table;

    } else {
        let user = JSON.parse(localStorage.getItem("currentUser"));

        if(user){
            content.innerHTML = `
                <h3>Your Profile</h3>
                <table border="1" cellpadding="10">
                    <tr><th>Field</th><th>Value</th></tr>
                    <tr><td>First Name</td><td>${user.fname}</td></tr>
                    <tr><td>Second Name</td><td>${user.sname}</td></tr>
                    <tr><td>Last Name</td><td>${user.lname}</td></tr>
                    <tr><td>Phone</td><td>${user.phone}</td></tr>
                    <tr><td>Gender</td><td>${user.gender}</td></tr>
                    <tr><td>Email</td><td>${user.email}</td></tr>
                    <tr><td>Nationality</td><td>${user.nation}</td></tr>
                </table>
            `;
        }
    }
}

// Show pages
function show(page){
    document.querySelectorAll('.page').forEach(p => p.style.display='none');
    document.getElementById(page).style.display='block';
}

// Start with register page
show('register');

// REGISTER
document.getElementById("regForm").addEventListener("submit", function(e){
    e.preventDefault();

    let student = {
        fname: fname.value,
        sname: sname.value,
        lname: lname.value,
        phone: phone.value,
        gender: gender.value,
        email: email.value,
        nation: nation.value,
        password: password.value
    };

    let students = JSON.parse(localStorage.getItem("students")) || [];
    students.push(student);
    localStorage.setItem("students", JSON.stringify(students));

    alert("Registered Successfully!");
    show('login');
});

// LOGIN
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let phone = lphone.value;
    let pass = lpassword.value;

    let students = JSON.parse(localStorage.getItem("students")) || [];

    let user = students.find(s => s.phone === phone && s.password === pass);

    if(user){
        localStorage.setItem("currentUser", JSON.stringify(user));
        loadDashboard();
        show('dashboard');
    } else {
        alert("Wrong phone or password!");
    }
});

// ADMIN LOGIN
function adminLogin(){
    let pass = adminPass.value;

    if(pass === "sam"){
        localStorage.setItem("admin", "true");
        loadDashboard();
        show('dashboard');
    } else {
        alert("Wrong admin password!");
    }
}

// LOAD DASHBOARD
function loadDashboard(){
    let output = document.getElementById("output");
    let isAdmin = localStorage.getItem("admin");

    output.innerHTML = "";

    if(isAdmin === "true"){
        let students = JSON.parse(localStorage.getItem("students")) || [];

        output.innerHTML = "<h3>My profile registered</h3>";

        students.forEach(s => {
            output.innerHTML += `
                <p>
                ${s.fname} ${s.sname} ${s.lname}<br>
                Phone: ${s.phone}<br>
                Gender: ${s.gender}<br>
                Email: ${s.email}<br>
                Nationality: ${s.nation}
                </p><hr>
            `;
        });

    } else {
        let user = JSON.parse(localStorage.getItem("currentUser"));

        output.innerHTML = `
            <h3>Your Profile</h3>
            ${user.fname} ${user.sname} ${user.lname}<br>
            Phone: ${user.phone}<br>
            Gender: ${user.gender}<br>
            Email: ${user.email}<br>
            Nationality: ${user.nation}
        `;
    }
}

// LOGOUT
function logout(){
    localStorage.removeItem("currentUser");
    localStorage.removeItem("admin");
    show('login');
}
</script>

</body>
</html>
